<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniRec AI — Authentication</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #0a0a1a;
            color: #e1e2e8;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            text-align: center;
            padding: 48px 40px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(124, 92, 252, 0.08) 0%, rgba(30, 30, 50, 0.95) 100%);
            border: 1px solid rgba(124, 92, 252, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            max-width: 380px;
            width: calc(100% - 48px);
            animation: card-in 400ms cubic-bezier(0.05, 0.7, 0.1, 1);
        }

        @keyframes card-in {
            from {
                opacity: 0;
                transform: scale(0.94) translateY(8px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .icon {
            margin-bottom: 16px;
            font-size: 48px;
        }

        h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        p {
            font-size: 14px;
            color: #a0a4b0;
            line-height: 1.5;
        }

        .closing {
            margin-top: 24px;
            font-size: 12px;
            color: #73777F;
        }

        .error h2 {
            color: #ff6b6b;
        }

        .success h2 {
            color: #7c5cfc;
        }
    </style>
</head>

<body>
    <div class="card" id="card">
        <div class="icon" id="icon">✅</div>
        <h2 id="title">Authentication successful</h2>
        <p id="message">You can close this tab and return to AniRec AI.</p>
        <p class="closing">This window will close automatically&hellip;</p>
    </div>
    <script>
        (function () {
            var url = window.location.href;
            var params = new URLSearchParams(window.location.search);
            var error = params.get("error");

            if (error) {
                document.getElementById("icon").textContent = "❌";
                document.getElementById("card").classList.add("error");
                document.getElementById("title").textContent = "Authentication failed";
                document.getElementById("message").textContent = error;
            } else {
                document.getElementById("card").classList.add("success");
            }

            var sent = false;
            var payload = { type: "oauth-callback", url: url, error: error || null };

            // Method 1: window.opener.postMessage (works if COOP didn't break it)
            if (window.opener) {
                try {
                    window.opener.postMessage(payload, window.location.origin);
                    sent = true;
                } catch (e) {
                    // COOP blocked access to opener
                }
            }

            // Method 2: BroadcastChannel (works even when COOP breaks window.opener)
            try {
                var bc = new BroadcastChannel("anirec-oauth");
                bc.postMessage(payload);
                sent = true;
                // Close the channel after a short delay
                setTimeout(function () { bc.close(); }, 1000);
            } catch (e) {
                // BroadcastChannel not supported in this browser
            }

            // Method 3: localStorage event fallback (ultimate fallback)
            try {
                localStorage.setItem("anirec_oauth_result", JSON.stringify(payload));
                sent = true;
            } catch (e) {
                // localStorage not available
            }

            if (!sent) {
                document.getElementById("message").textContent =
                    "Could not communicate with the main window. Please copy the URL and paste it manually.";
            }

            setTimeout(function () { window.close(); }, 2000);
        })();
    </script>
</body>

</html>
